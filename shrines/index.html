<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>sadgrl.online</title>
    <meta property="twitter:card" content="summary_large_image" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style.css" />
    <script src="../assets/scripts/load.js"></script>

    <link rel="icon" href="../assets/images/fav.gif" type="image/gif" />
  </head>

  <body>
    <div id="container">
      <div class="topbar"></div>
      <div id="flex">
        <main>
          <div class="title">&nbsp; Shrines</div>
          <div class="content">
            <p>
              Shrines are webpages dedicated to specific topics, hobbies, or
              interests. Click on the image to visit each shrine!
            </p>
            <div class="shrines">
              <div class="flex-shrine">
                <a href="shrines/overwatch/" target="_blank"
                  ><img
                    src="https://sadhost.neocities.org/images/overwatch/ow-shrine.png"
                    alt="a screenshot and link to my Overwatch web shrine"
                /></a>
              </div>
              <div class="flex-shrine">
                <a href="shrines/tatu/" target="_blank"
                  ><img
                    src="https://sadhost.neocities.org/images/tatu/tatu-shrine.png"
                    alt="a screenshot and link to my tATu web shrine"
                /></a>
              </div>
              <div class="flex-shrine">
                <a href="shrines/webtv/" target="_blank"
                  ><img
                    src="./webtv/img/webtv-shrine.png"
                    alt="a screenshot and link to my WebTV web shrine"
                /></a>
              </div>
            </div>
          </div>
        </main>
        <aside>
          <div class="sidebar-title">&nbsp; Navigation</div>
          <nav id="nav"></nav>
        </aside>
      </div>
      <footer id="footer"></footer>
    </div>
    <style>
      .content img {
        max-width: 100%;
      }
    </style>
  </body>
</html>
