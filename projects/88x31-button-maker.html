<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>sadgrl.online</title>
    
    <meta property="twitter:card" content="summary_large_image" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css" />
    <script src="../assets/scripts/load.js"></script>
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <link rel="icon" href="../assets/images/fav.gif" type="image/gif" />
</head>

<body>
    <div id="container">
        <div class="topbar">
            </div>
        <div id="flex">

            <main>
                <div class="title">&nbsp; 88x31 button maker</div>
                <div class="content">
                    <strong>Tip:</strong> Copying and pasting <a href="https://emojipedia.org/" TARGET="_blank">emojis</a>
                    works)<br><br>
                    <div class="left"><strong>Button Preview:</strong><br>
                        <div id="output">
                            <p id="text"></p>
                        </div><br><br>
                    </div>
                    <div class="contain">
                        <div class="option"><strong>Enter your text<br></strong><br>
                            <textarea id="input" type="text" autocomplete="off" value="%{text}"></textarea></div>
                        <strong>Premade Styles:</strong>
                        <input type="checkbox" id="retroButton" name="retroButton">
                        <label for="retroButton">retro mode</label>
                        <div class="option"><strong>Upload</strong>
                            <input type="file" name="file" id="upload" class="inputfile" title="aa" /></div>
                        <div class="option"><strong>Background color:</strong><input id="bg-color" type="color" value="#ffffff"></input></div>
                        <div class="option"><strong>Text color:</strong>
                            <input id="text-color" type="color" value="#000000"></input></div>
                        <div class="option"><strong>Border color:</strong>
                            <input id="border-color" type="color" value="#000000"></input></div>
                        <div class="option"><strong>Border thickness (px):</strong>
                            <input id="border-width" value="1" max="8"></input></div>
                        <div class="option"><strong>Text-align:</strong><br><br>
                            <div><label for="left">Left</label><input type="radio" id="align" name="align" value="left" checked>
                                <label for="center">Center</label><input type="radio" id="align" name="align" value="center">
                                <label for="right">Right</label><input type="radio" id="align" name="align" value="right"></div>
                        </div>
                        <div class="option"><button id="into-image">Make into image</button><br><br></div>
                        <div class="option" id="results"></div>

                        <p>Click 'make into image' and right-click > 'save as' to save your creation!</p>
                </div>
            </main>
            <aside>
                <div class="sidebar-title">&nbsp; Navigation</div>
                <nav id="nav">
        
                </nav>
            </aside>
        </div>
        <footer id="footer"></footer>
    </div>
    <style>
        @font-face {
            font-family: silkscreen;
            src: url(https://sadhost.neocities.org/fonts/slkscr.woff);
        }

        .sidebar {
            height: 99.65%;
        }

        .article {
            padding-left: 50px;
            padding-right: 50px;
            position: relative;
        }

        #output {
            font-family: silkscreen;
            width: 88px;
            height: 31px;
            margin-top: 10px;
            font-size: 8px;
            line-height: 8px;
            padding-top: 3px;
            margin: 0;
            box-sizing: border-box;
            overflow: hidden;
            background-image: url('');
            background-size: cover;
            background-position: center;
            border: 1px solid #bbb;
        }

        #text {
            font-size: 8px;
            padding-top: 0px;
            margin-top: 0px;
            padding-left: 5px;
            width: 74px;
            height: 27px;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            font-smooth: always;
            padding-bottom: 0;
            margin-bottom: 0;
        }

        #into-image {
            margin-top: 10px;
            width: 300px;
            height: 50px;
        }

        #border-width {
            width: 20px;
            height: 20px;
        }

        #input {
            height: 20px;
            min-width: 100px !important;
            width: 100px;
            margin-left: 10px;
        }

        input[type="color"i] {
            width: 50px;
            height: 30px;
            background-color: var(--bg);
            border: none;
            display: inline-block;
            margin-top: -5px;
        }

        label {
            display: inline !important;
        }

        input[type="color"]::-webkit-color-swatch {
            border: none;
        }

        .flex {
            display: flex;
            flex-wrap: wrap;
        }

        .option {
            margin-right: 55px;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        textarea {
            border-color: 1px solid var(--accent-4);
            font-family: Space Grotesk;
            min-height: 50px;
        }

        input[type="file"i] {
            background-color: var(--bg);
            color: white;

        }

        input[type="file"] {
            width: 90px;
        }

        #results {
            width: 88px;
            height: 31px;
        }

        /* .title {
            position: absolute;
            top: 30px;
            left: 30px;
        } */


        .contain {
            width: 500px;

        }
    </style>
    <script>
        var submit = document.getElementById('submit');
        var input = document.getElementById('input');
        var output = document.getElementById('output');
        var text = document.getElementById('text');
        var retroButton = document.getElementById('retroButton');
        var bgColor = document.getElementById('bg-color');
        var textColor = document.getElementById('text-color');
        var intoImage = document.getElementById('into-image');
        var borderColor = document.getElementById('border-color');
        var borderWidth = document.getElementById('border-width');
        var align = document.getElementById('align');

        function showPreview() {
            text.innerText = input.value;
            output.style.backgroundColor = bgColor.value;
            output.style.color = textColor.value;
            output.style.border = borderWidth.value + 'px solid ' + borderColor.value;
            var ele = document.getElementsByName('align');
            for (i = 0; i < ele.length; i++) {
                if (ele[i].checked) {
                    text.style.textAlign = ele[i].value;
                }

            }

            if (retroButton.checked) {
                //alert("checked");
                output.style.borderStyle = "inset";
                output.style.borderBottom = "2px solid black"
                output.style.borderRight = "2px solid black"
                output.style.borderTop = "2px solid white"
                output.style.borderLeft = "2px solid white"
                output.style.backgroundColor = "#9a9c9d"
            } else {
                // alert("You didn't check it! Let me check it for you.");
            }
            document.getElementById('upload').addEventListener('change', readURL, true);

            function readURL() {
                var file = document.getElementById("upload").files[0];
                var reader = new FileReader();
                reader.onloadend = function() {
                    document.getElementById('output').style.backgroundImage = "url(" + reader.result + ")";
                }
                if (file) {
                    reader.readAsDataURL(file);
                } else {}
            }

            function getBounds(node) {
                if (node.getBoundingClientRect) {
                    var clientRect = node.getBoundingClientRect();
                    var width = node.offsetWidth == null ? clientRect.width : node.offsetWidth;
                    return {
                        top: Math.floor(clientRect.top),
                        bottom: Math.floor(clientRect.bottom || (clientRect.top + clientRect.height)),
                        right: Math.floor(clientRect.left + width),
                        left: Math.floor(clientRect.left),
                        width: width,
                        height: node.offsetHeight == null ? clientRect.height : node.offsetHeight
                    };
                }
                return {};
            }
        }
        setInterval(showPreview, 1000);

        function displayRadioValue() {
            var ele = document.getElementsByName('align');

            for (i = 0; i < ele.length; i++) {
                if (ele[i].checked === "center") {
                    console.log('test');
                    text.style.margin = "0 auto";
                } else if (ele[i].checked) {
                    console.log('hi');
                    text.style.textAlign = ele.value();
                }
            }
        }


        function convert2image() {
            var myOutput = document.getElementById('output');
            var resultsDiv = document.getElementById('results');

            resultsDiv.innerHTML = '';

            domtoimage.toPng(myOutput, {
                height: 31,
                width: 88
            }).then(function(dataUrl) {
                var img = new Image();
                img.src = dataUrl;
                resultsDiv.appendChild(img);
            }).catch(function(error) {
                console.error('oops, something went wrong!', error);
            });
        }




        intoImage.addEventListener("click", convert2image);
    </script>

</body>

</html>
