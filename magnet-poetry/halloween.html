<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap');

  font-family: Halloween;

    margin:0;

body {
    font-family:sans-serif;

}

}

#canvasWrapper {

.dragWord {

  border-bottom:1px solid black;

  margin-bottom:10px;

}

<script>

let suffixesArr = ['ing', 'y', 'es', 'ies', 's', 'd', 'ed', '-like', '-shaped', '-thin', '-dark', '-fanged'];

let commonArr = ['a', 'an', 'the', 'there', 'is', 'these', 'those', 'are', 'they', 'their', 'she', 'her', 'he', 'his', 'me', 'I', 'am', 'you', 'because', 'if', 'be', 'to', 'of', 'in', 'have', 'not', 'on', 'as', 'at', 'but', 'by', 'do', 'from', 'or', 'will', 'so', 'get', 'give', 'would', 'could', 'should', 'was', 'were', 'your', 'us', 'we', 'them', 'like', 'and', 'who', 'what', 'when', 'where', 'why' ];

let nounArr = ['apparition', 'witch', 'goddess', 'mistress', 'cave', 'cliff', 'woods', 'bat', 'owl', 'moth', 'serpent', 'toad', 'creature', 'wolf', 'cat', 'fog', 'insect',  'critter', 'storm', 'wood', 'star', 'moon', 'vine', 'cloud', 'bough', 'shadow', 'mist', 'rebirth', 'death', 'eternity', 'mercy', 'spirit', 'burial', 'destruction', 'elixir', 'evening', 'night', 'twilight', 'dusk', 'halloween', 'ghost', 'ghoul', 'goblin', 'rat', 'raven', 'spell', 'spider', 'spirit', 'skeleton', 'autumn', 'broomstick', 'cemetery', 'crypt', 'corpse', 'cobweb', 'tombstone', 'pumpkin', 'demon', 'lantern', 'mausoleum', 'monster', 'mummy', 'nightmare', 'October', 'ogre', 'phantom', 'poltergeist', 'sugar', 'skull', 'shadow', 'potion', 'blood', 'troll', 'candy', 'costume', 'scythe', 'vampire'];

let verbArr = ['vanish', 'howl', 'growl', 'groan', 'scream', 'devastate', 'shatter', 'watch', 'touch', 'show', 'tell', 'ask', 'screech', 'petrify', 'cackle', 'cloak', 'chill', 'enchant', 'reaper', 'hang', 'glitter', 'flicker', 'glow', 'sparkle', 'pulse', 'sweep', 'writhe', 'bloom', 'brim', 'grow', 'bask', 'ignite', 'illuminate', 'intensify', 'gravitate', 'clutch', 'cower', 'shrivel', 'shimmer', 'crunch', 'float', 'weave', 'bounce', 'reflect', 'tremble', 'whisper', 'pulsate', 'smooth', 'dive', 'crash', 'glide', 'lurch', 'electrify', 'squeeze', 'grasp', 'catapult', 'trick', 'treat', 'swing', 'crumble'];

let adjectiveArr = ['haunting', 'hair-raising', 'pale', 'brittle', 'half-lit', 'cascading', 'fringed', 'tangled', 'sunless', 'mystical', 'silken', 'sleepy', 'wet', 'snowy', 'purple', 'black', 'orange', 'violet', 'bloodcurdling', 'creepy', 'frightful', 'fanged', 'ghostly', 'ghastly', 'haunted', 'bizarre', 'eerie', 'evil', 'grim', 'spooky', 'scary', 'uncanny', 'otherworldly', 'weird' ];

let adverbArr = ['barely', 'sleepily', 'sadly', 'slowly', 'clumsily', 'wistfully'];

let prepositionArr = ['above', 'beside', 'among', 'beneath', 'across', 'before', 'behind', 'below', 'onto', 'inside', 'under', 'up', 'with'];

let nounVerbArr = [...nounArr, ...verbArr];

let fullWordArr = [...suffixesArr, ...commonArr, ...nounArr, ...verbArr, ...adjectiveArr, ...adverbArr, ...prepositionArr];

console.log(fullWordArr);

fullWordArr.forEach((element, index) => { 
  if (suffixesArr.includes(element)) {
   $('#suffixes').append( '<span class="dragWord ui-droppable" id="' + element + '">' + element + '</span>' )
  } else if (commonArr.includes(element)) {
   $('#commonWords').append( '<span class="dragWord ui-droppable" id="' + element + '">' + element + '</span>' )
    } else if (nounArr.includes(element)) {
   $('#nouns').append( '<span class="dragWord ui-droppable" id="' + element + '">' + element + '</span>' )
} else if (verbArr.includes(element)) {
      $('#verbs').append( '<span class="dragWord ui-droppable" id="' + element + '">' + element + '</span>' )
} else if (adjectiveArr.includes(element)) {
    $('#adjectives').append( '<span class="dragWord ui-droppable" id="' + element + '">' + element + '</span>' )
  } else {
  $('#otherWords').append( '<span class="dragWord ui-droppable" id="' + element + '">' + element + '</span>' )
  }
  
});

$("#canvas").droppable({
  accept: '.dragWord',
  drop: function(e, ui) {
    console.log('$(ui.draggable)[0].id is ' + $(ui.draggable)[0].id)
    var wordID = $(ui.draggable)[0].id;
    if (suffixesArr.includes(wordID)) {
      console.log('has an s');
       var offset = $(this).position();
      var clone = ui.draggable.clone(false);
      clone.css('left', ui.offset.left - offset.left)
      		 .css('top', ui.offset.top - offset.top)
           .css('position', 'absolute')
           .removeClass('ui-draggable ui-draggable-dragging dragWord')
           .removeClass('verbs')
      		 .addClass('dropped-element addOnWords');
      //console.log(clone);
      $('#canvas').append(clone);
      $(clone).draggable({
      	containment: 'parent',
        snap: true,
        snapMode:"both",
        snapTolerance:10,
      });
    } else if ($(ui.draggable)[0].id != "") {
      var offset = $(this).position();
      var clone = ui.draggable.clone(false);
      clone.css('left', ui.offset.left - offset.left)
      		 .css('top', ui.offset.top - offset.top)
           .css('position', 'absolute')
           .removeClass('ui-draggable ui-draggable-dragging dragWord')
           .removeClass('verbs')
      		 .addClass('dropped-element wordStyle');
      //console.log(clone);
      $('#canvas').append(clone);
      $(clone).draggable({
      	containment: 'parent',
      });
    } else {
      console.log('error');
    }
  }
});

function addDraggable(){
  $(".dragWord").draggable({
  helper: 'clone',
  cursor: 'move',
  revert: false,
  grid: [5, 5],
  zIndex: 1,
  });
}

addDraggable();

if( /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ) {
 $(document).on("taphold", ".dropped-element", function() {
  $(this).remove();
});
} else {
$(document).on("dblclick", ".dropped-element", function() {
  $(this).remove();
});
}


$(document).on("click", "#export", function() {
  $('#exportText').val($('#canvas').html())
});</script>
  
</body>
